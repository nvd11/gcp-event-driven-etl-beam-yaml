steps:
  # Step 1: Build the container image for the orchestrator service
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO_NAME/beam-yaml-orchestrator:$COMMIT_SHA'
      # Set build context to the cloudrun directory
      - './cloudrun'

  # Step 2: Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO_NAME/beam-yaml-orchestrator:$COMMIT_SHA'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'beam-yaml-orchestrator'
      - '--image'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO_NAME/beam-yaml-orchestrator:$COMMIT_SHA'
      - '--region'
      - '$_REGION'
      # Crucial for Option B: Beam SDK parsing DAG in memory requires more RAM.
      - '--memory'
      - '2Gi'
      - '--port'
      - '8080'
      - '--allow-unauthenticated'

# Define images to be pushed automatically by Cloud Build
images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO_NAME/beam-yaml-orchestrator:$COMMIT_SHA'

# Default substitution values (can be overridden during build trigger)
substitutions:
  _REGION: 'europe-west2'
  _AR_REPO_NAME: 'my-docker-repo'
